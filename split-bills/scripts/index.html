<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Bill Splitter Skill</title>
</head>
<body>
    <script>
        /**
         * AI Edge Gallery Bill Splitter Logic
         * Re-implemented from Python reference for on-device JS execution.
         */
        window.ai_edge_gallery_get_result = function(data) {
            try {
                if (!data.amount || data.amount < 0) throw new Error("amount must be non-negative");
                if (!data.people || data.people <= 0) throw new Error("people must be greater than zero");

                const amount = parseFloat(data.amount);
                const people = parseInt(data.people);
                const taxPercent = parseFloat(data.taxPercent || 0);
                const taxAmount = parseFloat(data.taxAmount || 0);
                const tipPercent = parseFloat(data.tipPercent || 0);
                const tipAmount = parseFloat(data.tipAmount || 0);
                const tipBase = data.tipBase || "subtotal"; // subtotal or total
                const currency = data.currency || "$";

                let tax = taxAmount;
                if (taxPercent > 0) tax = amount * (taxPercent / 100);

                let tip = tipAmount;
                const tipBasis = tipBase === "total" ? (amount + tax) : amount;
                if (tipPercent > 0) tip = tipBasis * (tipPercent / 100);

                const total = amount + tax + tip;
                const perPerson = total / people;

                const res = [
                    `Subtotal: ${currency}${amount.toFixed(2)}`,
                    `Tax: ${currency}${tax.toFixed(2)}`,
                    `Tip: ${currency}${tip.toFixed(2)}`,
                    `Total: ${currency}${total.toFixed(2)}`,
                    `Split ${people} ways: ${currency}${perPerson.toFixed(2)} each`
                ].join("\n");

                return JSON.stringify({ result: res });
            } catch (e) {
                return JSON.stringify({ error: e.message });
            }
        };
    </script>
</body>
</html>
