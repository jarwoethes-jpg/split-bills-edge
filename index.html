<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
</head>
<body>
    <script>
        window.ai_edge_gallery_get_result = async (data) => {
            try {
                const jsonData = typeof data === 'string' ? JSON.parse(data) : data;
                
                const amount = parseFloat(jsonData.amount);
                const people = parseInt(jsonData.people);
                
                if (isNaN(amount) || amount < 0) throw new Error("Invalid amount");
                if (isNaN(people) || people <= 0) throw new Error("Invalid number of people");
                
                const taxPercent = parseFloat(jsonData.taxPercent || 0);
                const taxAmount = parseFloat(jsonData.taxAmount || 0);
                const tipPercent = parseFloat(jsonData.tipPercent || 0);
                const tipAmount = parseFloat(jsonData.tipAmount || 0);
                
                let tax = taxAmount;
                if (taxPercent > 0) tax = amount * (taxPercent / 100);

                let tip = tipAmount;
                const tipBasis = (jsonData.tipBase === "total") ? (amount + tax) : amount;
                if (tipPercent > 0) tip = tipBasis * (tipPercent / 100);

                const total = amount + tax + tip;
                const perPerson = total / people;
                const currency = jsonData.currency || "$";

                const result = `Subtotal: ${currency}${amount.toFixed(2)}\n` +
                               `Tax: ${currency}${tax.toFixed(2)}\n` +
                               `Tip: ${currency}${tip.toFixed(2)}\n` +
                               `Total: ${currency}${total.toFixed(2)}\n` +
                               `Split ${people} ways: ${currency}${perPerson.toFixed(2)} each`;

                return JSON.stringify({ result: result });
            } catch (e) {
                return JSON.stringify({ error: e.message });
            }
        };
    </script>
</body>
</html>
